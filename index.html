<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack | Smart Waste Report</title>

  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #15803d; /* Hijau pekat */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Container Presisi Tengah */
    .splash-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .splash-logo {
      font-size: 64px;
      margin-bottom: 12px;
      animation: pulse 1.8s infinite ease-in-out;
    }

    .splash-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    .splash-subtitle {
      font-size: 14px;
      opacity: 0.85;
      margin-top: 4px;
    }

    /* Spinner Loading */
    .loader {
      margin-top: 35px;
      width: 36px;
      height: 36px;
      border: 3.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @media (max-width: 480px) {
      .splash-logo { font-size: 52px; }
      .splash-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <div class="splash-logo">
      <i class="fa-solid fa-recycle"></i>
    </div>
    <div class="splash-title">EcoTrack</div>
    <div class="splash-subtitle">Smart Waste Report</div>
    <div class="loader"></div>
  </div>

  <!-- CDN Supabase & JS Kamu -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script>
    // Fungsi untuk Eksekusi Pindah Halaman
    async function checkAndRedirect() {
      try {
        // Cek apakah variabel supabase ada dari file js/supabase.js
        if (typeof supabase !== 'undefined' && supabase.auth) {
          const { data } = await supabase.auth.getSession();
          if (data && data.session) {
            // Jika user terdeteksi sudah login -> Pindah ke Dashboard
            window.location.replace('dashboard.html');
            return;
          }
        }
      } catch (err) {
        console.error("Supabase Error / Offline:", err);
      }

      // Jika belum login / terjadi error -> Pindah ke Login
      window.location.replace('login.html');
    }

    // Jalankan timer 2.5 detik saat halaman dimuat
    window.addEventListener('load', () => {
      setTimeout(checkAndRedirect, 2500);
    });
  </script>
</body>
</html>
