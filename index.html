<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrack | Welcoming</title>

  <!-- Google Fonts & Font Awesome (Sesuai Projek Kamu) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #22c55e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Fullscreen Splash Screen Container */
    .splash-container {
      position: fixed;
      inset: 0;
      background: #15803d; /* Hijau Emerald Pekat */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      z-index: 9999;
      padding: 20px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .splash-logo {
      font-size: 64px;
      margin-bottom: 15px;
      animation: pulse 1.8s infinite ease-in-out;
    }

    .splash-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    .splash-subtitle {
      font-size: 14px;
      opacity: 0.85;
      margin-top: 5px;
    }

    /* Indikator Loading Presisi Tengah */
    .loader {
      margin-top: 35px;
      width: 38px;
      height: 38px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.9s linear infinite;
    }

    /* Animasi Keyframes */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* Responsif untuk Smartphone */
    @media (max-width: 480px) {
      .splash-logo { font-size: 52px; }
      .splash-title { font-size: 26px; }
      .splash-subtitle { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="splash-container" id="splash">
    <div class="splash-logo">
      <i class="fa-solid fa-recycle"></i>
    </div>
    <div class="splash-title">EcoTrack</div>
    <div class="splash-subtitle">Smart Waste Report</div>
    <div class="loader"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Cek status sesi login & alihkan otomatis setelah 2.5 detik
    window.addEventListener('DOMContentLoaded', async () => {
      setTimeout(async () => {
        // Jika kamu menggunakan Supabase Auth di file js/supabase.js
        if (typeof supabase !== 'undefined') {
          const { data: { session } } = await supabase.auth.getSession();
          
          if (session) {
            // Jika pengguna sudah login -> langsung ke Dashboard
            window.location.href = 'dashboard.html';
          } else {
            // Jika belum login -> arahkan ke halaman Login
            window.location.href = 'login.html';
          }
        } else {
          // Fallback jika Supabase belum siap -> arahkan ke Login
          window.location.href = 'login.html';
        }
      }, 2500); // Durasi tampil 2.5 detik
    });
  </script>
</body>
</html>
