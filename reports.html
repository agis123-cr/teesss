<button id="darkMode">
<i class="fa-solid fa-moon"></i>
</button>

</nav>

</header>



<main>


<section class="reportCard">


<h1>
<i class="fa-solid fa-camera"></i>
Laporkan Sampah
</h1>

<form id="reportForm">
<label>Foto Sampah</label>

<input 
type="file"
id="photo"
accept="image/*"
required>



<div id="preview"></div>

<label>Lokasi Sampah</label>

<div id="reportMap"></div>
<p id="selectedLocation">Belum memilih lokasi</p>
<label>Deskripsi</label>

<textarea
id="description"
placeholder="Contoh: Sampah plastik menumpuk di sungai">
</textarea>

<button type="submit">Kirim Laporan</button>
</form>

</section>

</main>
